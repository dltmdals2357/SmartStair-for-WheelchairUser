<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>휠체어 접근성 3D 시뮬레이션</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; pointer-events: none;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 10;
        }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif; cursor: pointer; z-index: 20;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; background: white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 15;
        }
        /* 동적 상태 알림 UI */
        #lock-indicator {
            display: none;
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            color: white; font-family: sans-serif; font-weight: bold;
            padding: 12px 24px; border-radius: 30px; z-index: 15;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 1.1em;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.05); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="start-screen">
        <h2>휠체어 안전 잠금장치 시뮬레이션</h2>
        <p>화면을 클릭하여 시작하세요 (오디오 활성화).</p>
        <p style="font-size: 0.9em; color: #ccc;">종료하려면 ESC 키를 누르세요.</p>
    </div>
    
    <div id="ui-layer">
        <p><b>W, A, S, D:</b> 이동</p>
        <p><b>마우스:</b> 시점 회전</p>
        <p><b>Space Bar:</b> 🔓 잠금장치 해제 (미끄러져 내려가기)</p>
        <hr style="border-color: #555;">
        <p><b>우측 경사로 (파랑):</b> 오르막 (안전락 작동)</p>
        <p><b>좌측 경사로 (주황):</b> 내리막 (안전락 작동)</p>
    </div>
    
    <div id="crosshair"></div>
    <div id="lock-indicator">🔒 안전 고정장치 체결됨</div>

    <script>
        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 5);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 2. 맵 환경 구성
        const matGround = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const matStair = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const matRampUp = new THREE.MeshLambertMaterial({ color: 0x2196F3 }); 
        const matRampDown = new THREE.MeshLambertMaterial({ color: 0xFF9800 }); 

        const ground = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 20), matGround);
        ground.position.y = -0.05;
        scene.add(ground);

        const topGround = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 10), matGround);
        topGround.position.set(0, 2, -10);
        scene.add(topGround);

        for(let i=0; i<4; i++) {
            const step = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 1.25), matStair);
            step.position.set(0, 0.25 + (i * 0.5), -1.25 - (i * 1.25));
            scene.add(step);
        }

        const rampGeo = new THREE.BoxGeometry(2, 5.4, 0.1);
        
        const leftRamp = new THREE.Mesh(rampGeo, matRampDown);
        leftRamp.position.set(-3, 1, -3.1);
        leftRamp.rotation.x = -Math.PI / 2 + Math.atan(2 / 5);
        scene.add(leftRamp);

        const rightRamp = new THREE.Mesh(rampGeo, matRampUp);
        rightRamp.position.set(3, 1, -3.1);
        rightRamp.rotation.x = -Math.PI / 2 + Math.atan(2 / 5);
        scene.add(rightRamp);

        // 3. Pointer Lock 및 오디오 설정
        let pitch = 0; 
        let yaw = 0;   
        let isPointerLocked = false;
        let audioCtx = null;
        const startScreen = document.getElementById('start-screen');
        const lockIndicator = document.getElementById('lock-indicator');

        // 정밀한 "찰칵!" 기계식 사운드 합성기
        function playClickSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            try {
                const now = audioCtx.currentTime;
                
                // 1. 앞의 "찰" 소리 (날카로운 금속 마찰음)
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1600, now);
                osc1.frequency.exponentialRampToValueAtTime(1000, now + 0.03);
                gain1.gain.setValueAtTime(0.15, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.04);

                // 2. 뒤의 "칵" 소리 (조금 더 무거운 고정음, 0.04초 딜레이)
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                const delay = 0.04;
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1100, now + delay);
                osc2.frequency.exponentialRampToValueAtTime(400, now + delay + 0.05);
                gain2.gain.setValueAtTime(0.12, now + delay);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.05);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(now + delay);
                osc2.stop(now + delay + 0.06);
            } catch(e) {
                console.error(e);
            }
        }

        // 잠금 해제 시 발생하는 "띠링-" 하는 릴리즈 사운드
        function playUnlockSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1400, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            } catch(e) {}
        }

        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            try {
                document.body.requestPointerLock();
            } catch (e) {
                console.warn("마우스 잠금을 지원하지 않습니다.");
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                isPointerLocked = true;
                startScreen.style.display = 'none';
            } else {
                isPointerLocked = false;
                startScreen.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                camera.rotation.set(pitch, yaw, 0);
            }
        });

        // 4. 키보드 입력 처리 (Space 추가)
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false;
        });

        // 5. 물리 변수 설정
        const baseSpeed = 0.06;
        const totalSteps = 10; 
        
        let lockTimer = 0;      
        let lastStep = -1;      
        
        // 미끄러짐(Sliding) 관련 물리 엔진 변수
        let isSlidingDown = false;
        let slideSpeed = 0;
        const gravity = 0.004;       // 중력 가속도
        const maxSlideSpeed = 0.14;  // 최대 미끄러짐 속도

        function animate() {
            requestAnimationFrame(animate);

            let moveX = 0;
            let moveZ = 0;
            let currentSpeed = baseSpeed;

            // [Space 키 감지 - 경사로 위에 있을 때만 작동]
            if (keys[' '] && !isSlidingDown && (camera.position.z < -0.6 && camera.position.z > -5.6)) {
                isSlidingDown = true;
                slideSpeed = 0.01; // 초기 미끄러짐 속도
                playUnlockSound();
            }

            // *** 미끄러짐 물리 상태 동작 ***
            if (isSlidingDown) {
                // 경사 아래(Z가 커지는 방향)로 가속도 적용
                slideSpeed = Math.min(maxSlideSpeed, slideSpeed + gravity);
                let nextZ = camera.position.z + slideSpeed;
                
                // 경사도 진척도 계산 및 시야(Y)의 부드러운 하강 (Stepped가 아닌 원래의 선형 progress 사용)
                let progress = Math.abs((nextZ + 0.6) / 5);
                let targetY = 1.2 + (progress * 2);

                // 바닥(z >= -0.6)에 도달하면 슬라이딩 종료 및 리셋
                if (nextZ >= -0.6) {
                    nextZ = -0.6;
                    targetY = 1.2;
                    isSlidingDown = false;
                    slideSpeed = 0;
                    lockIndicator.style.display = 'none';
                } else {
                    lockIndicator.style.display = 'block';
                    lockIndicator.innerHTML = '🔓 잠금장치 해제! 미끄러지는 중...';
                    lockIndicator.style.backgroundColor = 'rgba(40, 167, 69, 0.9)'; // 초록색 안전 상태 표시
                }

                camera.position.z = nextZ;
                camera.position.y = targetY;

            } else {
                // *** 일반 이동 및 잠금장치 체결 상태 ***
                if (lockTimer > 0) {
                    currentSpeed = 0; 
                    lockTimer--;
                    lockIndicator.style.display = 'block';
                    lockIndicator.innerHTML = '🔒 안전 고정장치 체결됨 (미끄럼 방지)';
                    lockIndicator.style.backgroundColor = 'rgba(220, 53, 69, 0.9)'; // 빨간색 잠금 상태 표시
                } else {
                    lockIndicator.style.display = 'none';
                }

                if (keys.w) moveZ -= currentSpeed;
                if (keys.s) moveZ += currentSpeed;
                if (keys.a) moveX -= currentSpeed;
                if (keys.d) moveX += currentSpeed;

                const dir = new THREE.Vector3(moveX, 0, moveZ);
                dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                let nextX = camera.position.x + dir.x;
                let nextZ = camera.position.z + dir.z;

                let canMove = true;
                let targetY = 1.2;

                if (nextZ < -0.6 && nextZ > -5.6) {
                    let progress = Math.abs((nextZ + 0.6) / 5);
                    let currentStep = Math.floor(progress * totalSteps);

                    if (nextX >= 2 && nextX <= 4) {
                        // [우측 경사로 - 올라가기 전용]
                        if (nextZ > camera.position.z) {
                            canMove = false; 
                        } else {
                            const steppedProgress = Math.floor(progress * totalSteps) / totalSteps;
                            targetY = 1.2 + (steppedProgress * 2);

                            // 한 칸 올라갈 때 "찰칵!" 딜레이 발생
                            if (currentStep !== lastStep) {
                                if (lastStep !== -1 && currentStep > lastStep) {
                                    lockTimer = 35; // 약 0.6초 멈춤
                                    playClickSound();
                                }
                                lastStep = currentStep;
                            }
                        }
                    } 
                    else if (nextX <= -2 && nextX >= -4) {
                        // [좌측 경사로 - 내려가기 전용]
                        if (nextZ < camera.position.z) {
                            canMove = false; 
                        } else {
                            // 내려갈 때도 고정장치가 동일하게 작동 (뚝뚝 끊김)
                            const steppedProgress = Math.floor(progress * totalSteps) / totalSteps;
                            targetY = 1.2 + (steppedProgress * 2);

                            // 한 칸 내려갈 때 "찰칵!" 동일하게 딜레이 발생
                            if (currentStep !== lastStep) {
                                if (lastStep !== -1 && currentStep < lastStep) {
                                    lockTimer = 35; 
                                    playClickSound();
                                }
                                lastStep = currentStep;
                            }
                        }
                    } 
                    else if (nextX > -2 && nextX < 2) {
                        canMove = false; 
                    } else {
                        canMove = false; 
                    }
                } else {
                    lastStep = -1;
                    if (nextZ <= -5.6) {
                        targetY = 1.2 + 2; 
                    }
                }

                if (canMove) {
                    camera.position.x = nextX;
                    camera.position.z = nextZ;
                    camera.position.y = targetY;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
